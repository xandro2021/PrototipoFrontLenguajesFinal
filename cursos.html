<!-- cursos.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cursos</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="/src/main.js"></script>
</head>

<body class="bg-slate-100">

    <!-- Navbar -->
    <nav class="bg-slate-800 shadow">
        <div class="max-w-7xl mx-auto flex justify-between items-center px-6 py-4">

            <h1 class="text-2xl font-bold text-white">
                Pasarela de Pagos
            </h1>

            <div class="flex gap-6">

                <a
                    href="cursos.html"
                    class="text-blue-300 font-semibold hover:text-blue-200 transition">
                    Cursos
                </a>

                <a
                    href="mis-matriculas.html"
                    class="text-white hover:text-blue-300 transition">
                    Mis Matrículas
                </a>

            </div>

            <button
                id="logout"
                class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg transition">

                Cerrar sesión

            </button>

        </div>
    </nav>

    <!-- Contenido -->
    <div class="max-w-7xl mx-auto mt-8">

        <div class="bg-white shadow rounded-lg overflow-hidden">

            <table class="w-full">

                <thead class="bg-slate-200">

                    <tr>

                        <th class="p-3">ID</th>

                        <th>Título</th>

                        <th>Descripción</th>

                        <th>Duración</th>

                        <th>Precio</th>

                        <th>Profesor</th>

                        <th>Categoría</th>

                        <th>Acción</th>

                    </tr>

                </thead>

                <tbody id="tablaCursos">

                </tbody>

            </table>

        </div>

    </div>

    <script type="module" src="/src/js/cursos.js"></script>

</body>
</html>
